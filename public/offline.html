<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>PO Check-In — Offline</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8fafc;
        color: #0f172a;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial,
          sans-serif;
      }
      main {
        max-width: 28rem;
        padding: 2rem;
        border-radius: 1rem;
        background: white;
        box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.35rem;
      }
      p {
        margin: 0.5rem 0;
        line-height: 1.45;
      }
      .status {
        display: inline-block;
        margin-top: 0.75rem;
        padding: 0.35rem 0.6rem;
        border-radius: 9999px;
        background: #dcfce7;
        color: #166534;
        font-weight: 600;
        font-size: 0.8rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You’re offline</h1>
      <p>PO Check-In can still open cached screens while your connection is unstable.</p>
      <p>Any new uploads need a connection and can be retried when service returns.</p>
      <span class="status">Waiting for network…</span>
    </main>
  </body>
</html>
